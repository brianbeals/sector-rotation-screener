name: Weekly sector screen

on:
  schedule:
    # Sunday 21:00 UTC = 4pm EST / 5pm EDT.
    # After Friday's US close, before Monday's US open.
    - cron: "0 21 * * 0"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write  # so the workflow can commit weekly/ artifacts back to main

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Run weekly screener and Claude commentary
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python weekly_run.py

      - name: Commit and push weekly artifacts
        run: |
          git config user.name "brianbeals"
          git config user.email "154365158+Bbeals42@users.noreply.github.com"
          git add weekly/ index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly run: $(date -u +'%Y-%m-%d')"
            git push
          fi
